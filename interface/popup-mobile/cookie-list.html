<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../popup/style.css" />
    <title>Safari Cookie Cleaner</title>
  </head>
  <body>
    <main class="popup-shell">
      <section class="panel card" aria-label="Cookie cleanup for the current site">
        <header class="panel-header">
          <span class="app-name">Safari Cookie Cleaner</span>
          <span class="domain" id="hostname-chip">—</span>
        </header>

        <div class="rows">
          <div class="row" id="site-row">
            <button class="row-clear" id="delete-site" type="button">
              Clear
            </button>
            <div class="row-content" id="site-row-content">
              <div class="row-main">
                <p class="row-label">Site</p>
                <p class="row-sub" id="site-sub">— cookies</p>
              </div>
              <select class="picker" id="site-picker">
                <option value="never" selected>Never</option>
                <option value="1h">1h</option>
                <option value="6h">6h</option>
                <option value="24h">1d</option>
              </select>
              <button class="row-tap-clear" id="site-tap-clear" type="button" aria-label="Clear cookies for this site">
                <span aria-hidden="true">🗑️</span>
              </button>
            </div>
          </div>

          <div class="row" id="subdomain-row">
            <button class="row-clear" id="delete-subdomain" type="button">
              Clear
            </button>
            <div class="row-content" id="subdomain-row-content">
              <div class="row-main">
                <p class="row-label" id="subdomain-label">Subdomain</p>
                <p class="row-sub" id="subdomain-sub">— cookies</p>
              </div>
              <select class="picker" id="subdomain-picker">
                <option value="never" selected>Never</option>
                <option value="1h">1h</option>
                <option value="6h">6h</option>
                <option value="24h">1d</option>
              </select>
              <button class="row-tap-clear" id="subdomain-tap-clear" type="button" aria-label="Clear cookies for this subdomain">
                <span aria-hidden="true">🗑️</span>
              </button>
            </div>
          </div>
        </div>

        <p class="panel-footer" id="status-footer" aria-live="polite">
          Automatic clearing is off — clear anytime above.
        </p>
      </section>

      <section class="card hidden" id="permission-card" aria-live="polite">
        <h2>Allow site access</h2>
        <p>
          Safari Cookie Cleaner needs permission for this site before it can
          remove cookies here.
        </p>
        <button class="button secondary" id="request-permission" type="button">
          Allow access to this site
        </button>
      </section>

      <section class="card hidden" id="evercookie-card">
        <h2>Evercookie scan</h2>
        <p class="evercookie-summary" id="evercookie-summary">Scanning…</p>
        <ul class="evercookie-badges" id="evercookie-badges"></ul>
        <p class="evercookie-warning hidden" id="evercookie-warning" role="status"></p>
      </section>

      <button class="link-button" id="manage-automation" type="button">
        Manage automation
      </button>
    </main>

    <script type="module" src="../popup/cookie-list.js"></script>
  </body>
</html>
